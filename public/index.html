  <body class="h-full bg-[#FFFFFF] flex font-[manrope]">
    <div
      class="sidebar bg-[#2D3439] px-[5rem] pt-[3rem] pb-[4rem] flex flex-col basis-[50rem]"
    >
      <img class="h-[5.2rem] mb-[4rem] self-center" src="img/logo.png" alt="" />
      <ul class="workouts h-[77vh] overflow-x-hidden">
        <form
          onsubmit="return false;"
          class="form grid rounded-[5px] bg-[#42484d] grid-cols-[1fr_1fr] px-[2.75rem] py-[1.5rem] mb-[1.75rem] h-[9.25rem] gap-y-[0.5rem] gap-x-[2.5rem] transition-all duration-[0.5s] hidden_form"
          action=""
        >
          <div class="form_row flex items-center">
            <label
              class="basis-1/2 grow-0 shrink-0 text-[1.5rem] text-[rgb(236,236,236)] font-semibold"
              for="type"
              >Type</label
            >
            <select
              class="options border-none bg-[rgb(214,222,224)] transition-all w-full outline-0 focus:bg-[#FFFFFF] duration-[0.2s] border-0 text-[1.4rem] px-[1.1rem] py-[0.3rem] rounded-[3px]"
              name=""
              id="type"
            >
              <option class="running" selected value="running">Running</option>
              <option class="cycling" value="cycling">Cycling</option>
            </select>
          </div>
          <div class="form_row flex items-center">
            <label
              class="basis-1/2 grow-0 shrink-0 text-[1.5rem] text-[rgb(236,236,236)] font-semibold"
              for="distance"
              >Distance</label
            >
            <input
              class="distance border-none bg-[rgb(214,222,224)] outline-0 focus:bg-[#FFFFFF] transition-all w-full duration-[0.2s] text-[1.4rem] px-[1.1rem] py-[0.3rem] rounded-[3px]"
              type="number"
              id="distance"
              placeholder="km"
            />
          </div>
          <div class="form_row flex items-center">
            <label
              class="basis-1/2 grow-0 shrink-0 text-[1.5rem] text-[rgb(236,236,236)] font-semibold"
              for="duration"
              >Duration</label
            >
            <input
              class="duration form_input border-none bg-[rgb(214,222,224)] outline-0 focus:bg-[#FFFFFF] transition-all w-full duration-[0.2s] text-[1.4rem] px-[1.1rem] py-[0.3rem] rounded-[3px]"
              id="duration"
              type="number"
              placeholder="min"
            />
          </div>
          <div class="form_row flex items-center">
            <label
              class="basis-1/2 grow-0 shrink-0 text-[1.5rem] text-[rgb(236,236,236)] font-semibold"
              for="cadence"
              >Cadence</label
            >
            <input
              class="cadence form_input border-none bg-[rgb(214,222,224)] outline-0 focus:bg-[#FFFFFF] transition-all w-full duration-[0.2s] text-[1.4rem] pl-[1.1rem] py-[0.3rem] rounded-[3px]"
              id="cadence"
              type="number"
              placeholder="step/min"
            />
          </div>
          <div class="form_row flex items-center hidden">
            <label
              class="basis-1/2 grow-0 shrink-0 text-[1.5rem] text-[rgb(236,236,236)] font-semibold"
              for="elevation"
              >Elev Gain</label
            >
            <input
              class="elevation form_input border-none bg-[rgb(214,222,224)] outline-0 focus:bg-[#FFFFFF] transition-all w-full duration-[0.2s] text-[1.4rem] pl-[1.1rem] py-[0.3rem] rounded-[3px]"
              id="elevation"
              type="number"
              placeholder="meters"
            />
          </div>
          <button class="form_btn hidden"></button>
        </form>
